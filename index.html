<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOUD</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --text: #ffffff;
      --text-muted: #888;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --blue: #3b82f6;
      --header-h: 100px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* ── Modal ── */
    #modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
    }
    #modal-overlay.hidden { display: none; }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 28px;
      width: min(360px, 90vw);
      text-align: center;
    }
    .modal-box h2 { font-size: 2rem; letter-spacing: 6px; margin-bottom: 8px; }
    .modal-box p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px; }
    .modal-box input {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .modal-box input:focus { border-color: var(--blue); }
    .modal-box button {
      width: 100%;
      padding: 14px;
      background: var(--blue);
      border: none; border-radius: 12px;
      color: #fff; font-size: 1rem; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .modal-box button:hover { opacity: 0.85; }

    /* ── Header ── */
    #header {
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 12px 20px 0;
      position: relative; z-index: 10;
    }
    .header-top {
      display: flex; align-items: center; gap: 10px;
      flex: 1;
    }
    .header-top h1 {
      font-size: 1.6rem; letter-spacing: 5px; font-weight: 800;
    }
    .header-nickname {
      font-size: 0.85rem; color: var(--text-muted);
      background: var(--surface2);
      padding: 4px 10px; border-radius: 20px;
      border: 1px solid var(--border);
      max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .tabs {
      display: flex; gap: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 8px 0;
      background: none; border: none;
      color: var(--text-muted);
      font-size: 0.8rem; font-weight: 700; letter-spacing: 2px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn.active {
      color: var(--text);
      border-bottom-color: var(--blue);
    }

    /* ── Views ── */
    .view {
      position: absolute;
      top: var(--header-h); left: 0; right: 0;
      bottom: 0;
      overflow-y: auto;
      transition: opacity 0.25s, transform 0.25s;
    }
    .view.hidden {
      opacity: 0; pointer-events: none; transform: translateY(8px);
    }

    /* ── Measure Tab ── */
    #view-measure {
      padding: 20px 20px 40px;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }

    .location-bar {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 16px;
      width: 100%; max-width: 420px;
      font-size: 0.85rem; color: var(--text-muted);
    }
    .location-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border); flex-shrink: 0;
      transition: background 0.4s;
    }
    .location-dot.found { background: var(--green); }
    #location-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── SVG Meter ── */
    .meter-wrap {
      position: relative; width: 260px; height: 170px;
    }
    .meter-svg {
      width: 260px; height: 170px; overflow: visible;
    }
    .meter-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding-bottom: 10px;
    }
    .db-number {
      font-size: 3.2rem; font-weight: 800; line-height: 1;
      transition: color 0.4s;
    }
    .db-unit { font-size: 1rem; color: var(--text-muted); margin-top: 2px; }
    .db-label {
      font-size: 0.75rem; letter-spacing: 3px; font-weight: 700;
      color: var(--text-muted); margin-top: 4px;
    }

    /* ── Measure Button ── */
    .measure-btn {
      padding: 16px 48px;
      background: var(--blue);
      border: none; border-radius: 50px;
      color: #fff; font-size: 1rem; font-weight: 700; letter-spacing: 2px;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    }
    .measure-btn:active { transform: scale(0.97); }
    .measure-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .measure-btn.listening { background: var(--red); }

    /* ── Nearby ── */
    .nearby-section { width: 100%; max-width: 420px; }
    .nearby-section h3 {
      font-size: 0.75rem; letter-spacing: 3px; color: var(--text-muted);
      margin-bottom: 12px;
    }
    .nearby-list { display: flex; flex-direction: column; gap: 8px; }
    .reading-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .reading-db {
      font-size: 1.4rem; font-weight: 800; min-width: 52px;
    }
    .reading-info { flex: 1; }
    .reading-nickname { font-size: 0.9rem; font-weight: 600; }
    .reading-meta { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
    .reading-badge {
      font-size: 0.65rem; letter-spacing: 2px; font-weight: 700;
      padding: 3px 8px; border-radius: 20px; border: 1px solid;
    }
    .badge-quiet   { color: var(--green); border-color: var(--green); }
    .badge-moderate{ color: var(--yellow); border-color: var(--yellow); }
    .badge-loud    { color: var(--red);   border-color: var(--red);   }

    .empty-state {
      text-align: center; color: var(--text-muted); font-size: 0.85rem;
      padding: 24px 0;
    }

    /* ── Map Tab ── */
    #view-map {
      padding: 0;
      overflow: hidden;
    }
    #map {
      width: 100%; height: 100%;
    }

    /* Pulsing dot */
    .pulse-dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 0 0 0 rgba(59,130,246,0.6);
      animation: pulse 1.6s infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0   rgba(59,130,246,0.6); }
      70%  { box-shadow: 0 0 0 12px rgba(59,130,246,0); }
      100% { box-shadow: 0 0 0 0   rgba(59,130,246,0); }
    }

    /* Leaflet popup tweak */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      border-radius: 12px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
    }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .popup-db { font-size: 1.5rem; font-weight: 800; margin-bottom: 4px; }
    .popup-meta { font-size: 0.8rem; color: var(--text-muted); line-height: 1.6; }
  </style>
</head>
<body>

<!-- Nickname Modal -->
<div id="modal-overlay">
  <div class="modal-box">
    <h2>LOUD</h2>
    <p>What should we call you?</p>
    <input id="nickname-input" type="text" placeholder="Enter your name" maxlength="30" autocomplete="off" />
    <button id="nickname-submit">Let's go</button>
  </div>
</div>

<!-- Header -->
<div id="header">
  <div class="header-top">
    <h1>LOUD</h1>
    <span class="header-nickname" id="header-nickname"></span>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="measure">MEASURE</button>
    <button class="tab-btn"        data-tab="map">MAP</button>
  </div>
</div>

<!-- Measure View -->
<div id="view-measure" class="view">
  <div class="location-bar">
    <div class="location-dot" id="location-dot"></div>
    <span id="location-text">Locating…</span>
  </div>

  <div class="meter-wrap">
    <svg class="meter-svg" viewBox="0 0 260 170">
      <!-- track arc -->
      <path id="arc-track" d="" fill="none" stroke="#1e1e1e" stroke-width="14" stroke-linecap="round"/>
      <!-- value arc -->
      <path id="arc-value" d="" fill="none" stroke="#22c55e" stroke-width="14" stroke-linecap="round"
            stroke-dasharray="0 1000" style="transition: stroke-dasharray 0.5s ease, stroke 0.4s ease;"/>
    </svg>
    <div class="meter-center">
      <span class="db-number" id="db-number">--</span>
      <span class="db-unit">dB</span>
      <span class="db-label" id="db-label">--</span>
    </div>
  </div>

  <button class="measure-btn" id="measure-btn">MEASURE</button>

  <div class="nearby-section">
    <h3>NEARBY READINGS</h3>
    <div class="nearby-list" id="nearby-list">
      <div class="empty-state">No readings within 100m yet</div>
    </div>
  </div>
</div>

<!-- Map View -->
<div id="view-map" class="view hidden">
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import { initializeApp }       from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js';
import { getFirestore,
         collection, addDoc,
         getDocs, query,
         orderBy, limit,
         serverTimestamp }     from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';

// ─── Firebase ───────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDuYM4gEzOkqpDZ0KN5DfK2KV_3xBdf-OM",
  authDomain: "loud-e6760.firebaseapp.com",
  projectId: "loud-e6760",
  storageBucket: "loud-e6760.firebasestorage.app",
  messagingSenderId: "139350793793",
  appId: "1:139350793793:web:c5e231109b36f758c1b0c0"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ─── Helpers ────────────────────────────────────────────────
function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function timeAgo(ts) {
  if (!ts) return 'just now';
  const secs = Math.floor((Date.now() - ts) / 1000);
  if (secs < 5)  return 'just now';
  if (secs < 60) return secs + 's ago';
  const mins = Math.floor(secs / 60);
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs  < 24) return hrs  + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function dbColor(db) {
  if (db < 50) return '#22c55e';
  if (db < 70) return '#eab308';
  return '#ef4444';
}

function dbLabel(db) {
  if (db === null || isNaN(db)) return '--';
  if (db < 50) return 'QUIET';
  if (db < 70) return 'MODERATE';
  return 'LOUD';
}

function badgeClass(label) {
  if (label === 'QUIET')    return 'badge-quiet';
  if (label === 'MODERATE') return 'badge-moderate';
  return 'badge-loud';
}

// ─── SVG Arc ────────────────────────────────────────────────
const CX = 130, CY = 145, R = 100;
const START_DEG = 225, TOTAL_SWEEP = 270;

function polarToXY(cx, cy, r, deg) {
  const rad = (deg - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function arcPath(cx, cy, r, startDeg, endDeg) {
  const s = polarToXY(cx, cy, r, startDeg);
  const e = polarToXY(cx, cy, r, endDeg);
  const sweep = endDeg - startDeg;
  const large = sweep > 180 ? 1 : 0;
  return `M ${s.x} ${s.y} A ${r} ${r} 0 ${large} 1 ${e.x} ${e.y}`;
}

function arcLength(r, degrees) {
  return (degrees / 360) * 2 * Math.PI * r;
}

const FULL_LEN = arcLength(R, TOTAL_SWEEP);

function setTrackArc() {
  document.getElementById('arc-track').setAttribute('d',
    arcPath(CX, CY, R, START_DEG, START_DEG + TOTAL_SWEEP));
}

function setValueArc(dbVal) {
  const arcEl = document.getElementById('arc-value');
  arcEl.setAttribute('d', arcPath(CX, CY, R, START_DEG, START_DEG + TOTAL_SWEEP));
  const MIN_DB = 20, MAX_DB = 100;
  const clamped = Math.max(MIN_DB, Math.min(MAX_DB, dbVal));
  const frac = (clamped - MIN_DB) / (MAX_DB - MIN_DB);
  const len  = frac * FULL_LEN;
  arcEl.style.strokeDasharray = `${len} ${FULL_LEN + 10}`;
  arcEl.style.stroke = dbColor(dbVal);
}

setTrackArc();

// ─── Nickname ───────────────────────────────────────────────
let nickname = localStorage.getItem('loud_nickname') || '';

function applyNickname(name) {
  nickname = name;
  document.getElementById('header-nickname').textContent = name;
}

const modalOverlay   = document.getElementById('modal-overlay');
const nicknameInput  = document.getElementById('nickname-input');
const nicknameSubmit = document.getElementById('nickname-submit');

function submitNickname() {
  const val = nicknameInput.value.trim();
  if (!val) { nicknameInput.focus(); return; }
  localStorage.setItem('loud_nickname', val);
  applyNickname(val);
  modalOverlay.classList.add('hidden');
}

nicknameSubmit.addEventListener('click', submitNickname);
nicknameInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitNickname(); });

if (nickname) {
  applyNickname(nickname);
  modalOverlay.classList.add('hidden');
} else {
  setTimeout(() => nicknameInput.focus(), 100);
}

// ─── Geolocation ────────────────────────────────────────────
let userLat = null, userLng = null, userAddress = 'Unknown location';

function reverseGeocode(lat, lng) {
  fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`, {
    headers: { 'Accept-Language': 'en' }
  })
  .then(r => r.json())
  .then(data => {
    const addr = data.address || {};
    userAddress = [
      addr.road || addr.pedestrian || addr.footway,
      addr.suburb || addr.neighbourhood || addr.city_district,
      addr.city || addr.town || addr.village
    ].filter(Boolean).join(', ') || data.display_name || 'Unknown location';
    document.getElementById('location-text').textContent = userAddress;
    document.getElementById('location-dot').classList.add('found');
  })
  .catch(() => {
    document.getElementById('location-text').textContent = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    document.getElementById('location-dot').classList.add('found');
  });
}

function getLocation() {
  if (!navigator.geolocation) {
    document.getElementById('location-text').textContent = 'Geolocation not supported';
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      reverseGeocode(userLat, userLng);
      loadNearbyReadings();
      if (leafletMap) {
        leafletMap.setView([userLat, userLng], 16);
        updateUserMarker();
      }
    },
    err => {
      document.getElementById('location-text').textContent = 'Location unavailable — please allow location access';
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

getLocation();

// ─── Tabs ────────────────────────────────────────────────────
const tabBtns = document.querySelectorAll('.tab-btn');
const views   = { measure: document.getElementById('view-measure'),
                  map:     document.getElementById('view-map') };
let activeTab      = 'measure';
let mapInitialized = false;

tabBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    if (tab === activeTab) return;
    tabBtns.forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    views[activeTab].classList.add('hidden');
    views[tab].classList.remove('hidden');
    activeTab = tab;
    if (tab === 'map') initMap();
  });
});

// ─── Measure ────────────────────────────────────────────────
const measureBtn = document.getElementById('measure-btn');
const dbNumber   = document.getElementById('db-number');
const dbLabelEl  = document.getElementById('db-label');

measureBtn.addEventListener('click', async () => {
  if (measureBtn.disabled) return;
  measureBtn.disabled = true;
  measureBtn.classList.add('listening');

  let audioCtx, analyser, source, stream;

  try {
    stream   = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    source   = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);

    const bufLen  = analyser.fftSize;
    const dataArr = new Float32Array(bufLen);

    const DURATION = 3;
    let dbSum = 0, dbCount = 0;

    for (let t = DURATION; t >= 1; t--) {
      measureBtn.textContent = `Listening… ${t}s`;
      await new Promise(resolve => {
        const end = Date.now() + 1000;
        const tick = () => {
          analyser.getFloatTimeDomainData(dataArr);
          let rms = 0;
          for (let i = 0; i < bufLen; i++) rms += dataArr[i] * dataArr[i];
          rms = Math.sqrt(rms / bufLen);
          if (rms > 0) {
            const dbVal = 20 * Math.log10(rms) + 90;
            dbSum += dbVal; dbCount++;
            const disp = Math.round(dbVal);
            dbNumber.textContent = disp;
            dbNumber.style.color = dbColor(disp);
            dbLabelEl.textContent = dbLabel(disp);
            setValueArc(disp);
          }
          if (Date.now() < end) requestAnimationFrame(tick);
          else resolve();
        };
        tick();
      });
    }

    const avgDb = dbCount > 0 ? Math.round(dbSum / dbCount) : 0;
    dbNumber.textContent = avgDb;
    dbNumber.style.color = dbColor(avgDb);
    dbLabelEl.textContent = dbLabel(avgDb);
    setValueArc(avgDb);

    if (userLat !== null) {
      await addDoc(collection(db, 'readings'), {
        lat:       userLat,
        lng:       userLng,
        db:        avgDb,
        nickname:  nickname || 'Anonymous',
        address:   userAddress,
        timestamp: serverTimestamp()
      });
      loadNearbyReadings();
      if (mapInitialized) loadMapReadings();
    }
  } catch (err) {
    console.error(err);
    measureBtn.textContent = 'Error – retry';
  } finally {
    if (source)   try { source.disconnect(); } catch(_){}
    if (analyser) try { analyser.disconnect(); } catch(_){}
    if (audioCtx) try { audioCtx.close(); } catch(_){}
    if (stream)   stream.getTracks().forEach(t => t.stop());
    measureBtn.disabled = false;
    measureBtn.classList.remove('listening');
    measureBtn.textContent = 'MEASURE';
  }
});

// ─── Nearby Readings ────────────────────────────────────────
async function loadNearbyReadings() {
  if (userLat === null) return;
  const nearbyList = document.getElementById('nearby-list');
  try {
    const q = query(collection(db,'readings'), orderBy('timestamp','desc'), limit(200));
    const snap = await getDocs(q);
    const nearby = [];
    snap.forEach(doc => {
      const d = doc.data();
      if (haversine(userLat, userLng, d.lat, d.lng) <= 100) nearby.push(d);
    });

    if (nearby.length === 0) {
      nearbyList.innerHTML = '<div class="empty-state">No readings within 100m yet</div>';
      return;
    }

    nearbyList.innerHTML = nearby.map(d => {
      const label = dbLabel(d.db);
      const color = dbColor(d.db);
      const ts    = d.timestamp ? d.timestamp.toMillis() : null;
      return `
        <div class="reading-item">
          <span class="reading-db" style="color:${color}">${Math.round(d.db)}<small style="font-size:0.55em;color:#888"> dB</small></span>
          <div class="reading-info">
            <div class="reading-nickname">${escapeHtml(d.nickname || 'Anonymous')}</div>
            <div class="reading-meta">${timeAgo(ts)}${d.address ? ' · ' + escapeHtml(d.address.split(',')[0]) : ''}</div>
          </div>
          <span class="reading-badge ${badgeClass(label)}">${label}</span>
        </div>`;
    }).join('');
  } catch(e) {
    console.error('loadNearbyReadings:', e);
  }
}

// ─── Map ─────────────────────────────────────────────────────
let leafletMap = null, userMarker = null, readingLayers = [];

function initMap() {
  if (mapInitialized) return;
  mapInitialized = true;

  const center = userLat ? [userLat, userLng] : [51.505, -0.09];
  leafletMap = L.map('map', { zoomControl: true }).setView(center, 15);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors © CARTO',
    maxZoom: 19
  }).addTo(leafletMap);

  if (userLat) updateUserMarker();
  loadMapReadings();
}

function updateUserMarker() {
  if (!leafletMap) return;
  const el = document.createElement('div');
  el.className = 'pulse-dot';
  if (userMarker) userMarker.remove();
  userMarker = L.marker([userLat, userLng], {
    icon: L.divIcon({ className: '', html: el, iconSize: [14,14], iconAnchor: [7,7] })
  }).addTo(leafletMap);
  leafletMap.setView([userLat, userLng], leafletMap.getZoom());
}

async function loadMapReadings() {
  if (!leafletMap) return;
  readingLayers.forEach(l => l.remove());
  readingLayers = [];

  try {
    const q = query(collection(db,'readings'), orderBy('timestamp','desc'), limit(500));
    const snap = await getDocs(q);
    snap.forEach(doc => {
      const d = doc.data();
      const color  = dbColor(d.db);
      const radius = 8 + (d.db / 100) * 18;
      const ts     = d.timestamp ? d.timestamp.toMillis() : null;
      const label  = dbLabel(d.db);
      const circle = L.circleMarker([d.lat, d.lng], {
        radius, color, fillColor: color, fillOpacity: 0.45, weight: 2
      }).addTo(leafletMap);

      circle.bindPopup(`
        <div class="popup-db" style="color:${color}">${Math.round(d.db)} dB</div>
        <div class="popup-meta">
          <b>${escapeHtml(d.nickname || 'Anonymous')}</b><br/>
          ${label}<br/>
          ${timeAgo(ts)}<br/>
          ${d.address ? escapeHtml(d.address) : ''}
        </div>
      `);
      readingLayers.push(circle);
    });
  } catch(e) {
    console.error('loadMapReadings:', e);
  }
}
</script>
</body>
</html>
